# OOVERT content admin — Sveltia CMS (Decap-compatible) configuration.
# Single-owner setup: sign in with a GitHub fine-grained token (Contents R/W).
# Saving commits the edited JSON back to `main`; Vercel rebuilds.
#
# IMPORTANT (git-based CMS): the CMS writes back ONLY the fields declared here.
# Every field `name` below must exactly equal its JSON key, and nested groups
# must mirror the JSON structure, or unknown keys are DROPPED on save.
# HTML-bearing values use string/text (NEVER markdown, which would mangle HTML).

backend:
  name: github
  repo: ezanbhutta/oovert
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  # ==========================================================================
  # Collection 1 — Site (files singleton: the homepage content in site.json)
  # ==========================================================================
  - name: settings
    label: "Site"
    files:
      - name: site
        label: "Homepage & site content"
        file: "src/_data/site.json"
        fields:
          # ---- meta -------------------------------------------------------
          - name: meta
            label: "Meta / SEO"
            widget: object
            fields:
              - { name: pageTitle, label: "Page title", widget: string }
              - { name: description, label: "Meta description", widget: text }
              - { name: canonicalUrl, label: "Canonical URL", widget: string }
              - { name: themeColor, label: "Theme colour", widget: string, hint: "Hex, e.g. #16140F" }
              - name: og
                label: "Open Graph"
                widget: object
                fields:
                  - { name: siteName, label: "Site name", widget: string }
                  - { name: title, label: "OG title", widget: string }
                  - { name: description, label: "OG description", widget: text }
                  - { name: url, label: "OG URL", widget: string }
                  - { name: image, label: "OG image URL", widget: string }
                  - { name: imageAlt, label: "OG image alt", widget: string }
              - name: twitter
                label: "Twitter card"
                widget: object
                fields:
                  - { name: title, label: "Twitter title", widget: string }
                  - { name: description, label: "Twitter description", widget: text }
                  - { name: image, label: "Twitter image URL", widget: string }
          # ---- schema (JSON-LD) -------------------------------------------
          - name: schema
            label: "Schema (JSON-LD org data)"
            widget: object
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: legalName, label: "Legal name", widget: string }
              - { name: url, label: "URL", widget: string }
              - { name: email, label: "Email", widget: string }
              - { name: foundingDate, label: "Founding date", widget: string }
              - { name: slogan, label: "Slogan", widget: string }
              - { name: description, label: "Description", widget: text }
              - { name: logo, label: "Logo URL", widget: string }
              - { name: image, label: "Image URL", widget: string }
              - { name: areaServed, label: "Area served", widget: string }
              - name: knowsAbout
                label: "Knows about"
                widget: list
                field: { name: item, label: "Topic", widget: string }
              - name: makesOffer
                label: "Makes offer"
                widget: list
                field: { name: item, label: "Offer", widget: string }
              - name: sameAs
                label: "Same as (profile URLs)"
                widget: list
                field: { name: item, label: "URL", widget: string }
          # ---- a11y -------------------------------------------------------
          - name: a11y
            label: "Accessibility"
            widget: object
            fields:
              - { name: skipLink, label: "Skip link text", widget: string }
          - { name: llmsTxt, label: "AI summary (llms.txt)", widget: text, required: false, hint: "Plain-text / Markdown summary served at /llms.txt for AI assistants. Keep it accurate; edit whenever the offer or pricing changes." }
          # ---- nav --------------------------------------------------------
          - name: nav
            label: "Top nav"
            widget: object
            fields:
              - name: links
                label: "Links"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: href, label: "Href", widget: string, hint: "e.g. #practice" }
              - { name: menuButtonLabel, label: "Menu button label", widget: string }
          # ---- menu -------------------------------------------------------
          - name: menu
            label: "Overlay menu"
            widget: object
            fields:
              - name: links
                label: "Links"
                widget: list
                fields:
                  - { name: num, label: "Number", widget: string }
                  - { name: label, label: "Label", widget: string }
                  - { name: href, label: "Href", widget: string }
              - { name: meta, label: "Meta line", widget: text, hint: "Keeps HTML: <br> makes a line break" }
          # ---- chapterRail (array of objects) -----------------------------
          - name: chapterRail
            label: "Chapter rail"
            widget: list
            fields:
              - { name: num, label: "Number", widget: string }
              - { name: href, label: "Href", widget: string }
              - { name: aria, label: "Aria label", widget: string }
          # ---- hero -------------------------------------------------------
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - name: metaTags
                label: "Meta tags"
                widget: list
                field: { name: item, label: "Tag", widget: string }
              - { name: title, label: "Title", widget: text, hint: "Keeps HTML: uses <span class=\"line\">, <em>… and newlines. Edit raw HTML." }
              - { name: lede, label: "Lede", widget: text }
              - name: ctaPrimary
                label: "Primary CTA"
                widget: object
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: url, label: "URL", widget: string }
              - name: ctaSecondary
                label: "Secondary CTA"
                widget: object
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: url, label: "URL", widget: string }
              - { name: scrollLabel, label: "Scroll label", widget: string }
              - { name: statusLine, label: "Status line", widget: string }
              - name: video
                label: "🎬 Hero background video (optional)"
                widget: object
                required: false
                collapsed: true
                hint: "Set a clip to play behind the hero headline. The hero switches to light text with a scrim for legibility. Best muted + looping, no controls."
                fields:
                  - { name: src, label: "Video file (mp4 / webm)", widget: file, required: false, hint: "Click, then Upload — this picker accepts videos (an Image picker does not). .mp4 has the widest support; .webm also works." }
                  - { name: poster, label: "Poster image", widget: image, required: false, hint: "Still frame shown before the clip plays and while it loads." }
                  - { name: autoplay, label: "Autoplay in view", widget: boolean, default: true, required: false, hint: "Plays (muted) when scrolled into view; pauses when off-screen." }
                  - { name: loop, label: "Loop", widget: boolean, default: true, required: false }
                  - { name: muted, label: "Muted", widget: boolean, default: true, required: false, hint: "Required for autoplay. Turn off only with autoplay off and controls on." }
                  - { name: controls, label: "Show player controls", widget: boolean, default: false, required: false, hint: "Native play / pause / volume bar. Leave off for background clips." }
                  - { name: speed, label: "Playback speed", widget: number, value_type: float, default: 1, min: 0.25, max: 3, step: 0.05, required: false, hint: "1 = normal, 0.5 = half speed, 2 = double." }
                  - { name: start, label: "Start (seconds)", widget: number, value_type: float, default: 0, min: 0, step: 0.1, required: false, hint: "Trim: begin playback at this time." }
                  - { name: end, label: "End (seconds)", widget: number, value_type: float, default: 0, min: 0, step: 0.1, required: false, hint: "Trim: stop here. 0 = play to the natural end." }
          # ---- premise ----------------------------------------------------
          - name: premise
            label: "Premise"
            widget: object
            fields:
              - { name: chapterLabel, label: "Chapter label", widget: string }
              - { name: statement, label: "Statement", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…, newlines." }
              - { name: body, label: "Body", widget: text }
              - { name: counter, label: "Counter", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…" }
              - { name: pullLine, label: "Pull line", widget: string, hint: "Keeps HTML: wrap an emphasis word in <em>…</em>" }
              - { name: pullNote, label: "Pull note", widget: text }
          # ---- manifesto --------------------------------------------------
          - name: manifesto
            label: "Manifesto"
            widget: object
            fields:
              - { name: text, label: "Text", widget: text, hint: "Keeps HTML: highlight terms with <span class=\"mf-key\">…</span>, emphasis with <em>…</em>" }
          # ---- practice ---------------------------------------------------
          - name: practice
            label: "Practice"
            widget: object
            fields:
              - { name: chapterLabel, label: "Chapter label", widget: string }
              - { name: intro, label: "Intro", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…" }
              - name: items
                label: "Items"
                widget: list
                fields:
                  - { name: num, label: "Number", widget: string }
                  - { name: name, label: "Name", widget: string }
                  - { name: desc, label: "Description", widget: text }
              - { name: terms, label: "Terms", widget: text }
          # ---- packages ---------------------------------------------------
          - name: packages
            label: "Packages"
            widget: object
            fields:
              - { name: chapterLabel, label: "Chapter label", widget: string }
              - { name: chapterNote, label: "Chapter note", widget: text }
              - { name: lead, label: "Lead", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…" }
              - name: onetime
                label: "One-time packages"
                widget: object
                fields:
                  - { name: note, label: "Note", widget: text }
                  - name: cards
                    label: "Cards"
                    widget: list
                    fields:
                      - { name: featured, label: "Featured", widget: boolean, required: false }
                      - { name: badge, label: "Badge", widget: string, required: false }
                      - { name: name, label: "Name", widget: string }
                      - { name: price, label: "Price", widget: string, hint: "Keeps HTML entities, e.g. &rsquo;" }
                      - { name: per, label: "Per (e.g. /mo)", widget: string, required: false }
                      - { name: desc, label: "Description", widget: string }
                      - { name: ctaLabel, label: "CTA label", widget: string, hint: "Keeps HTML entities, e.g. Let&rsquo;s talk" }
                      - { name: ctaUrl, label: "CTA URL", widget: string }
                      - { name: more, label: "More (\"Everything in …, plus\")", widget: string, required: false }
                      - name: features
                        label: "Features"
                        widget: list
                        field: { name: item, label: "Feature", widget: string, hint: "Keeps HTML entities, e.g. Vector &amp; source files" }
              - name: monthly
                label: "Monthly packages"
                widget: object
                fields:
                  - { name: note, label: "Note", widget: text }
                  - name: cards
                    label: "Cards"
                    widget: list
                    fields:
                      - { name: featured, label: "Featured", widget: boolean, required: false }
                      - { name: badge, label: "Badge", widget: string, required: false }
                      - { name: name, label: "Name", widget: string }
                      - { name: price, label: "Price", widget: string }
                      - { name: per, label: "Per (e.g. /mo)", widget: string, required: false }
                      - { name: desc, label: "Description", widget: string }
                      - { name: ctaLabel, label: "CTA label", widget: string, hint: "Keeps HTML entities, e.g. Let&rsquo;s talk" }
                      - { name: ctaUrl, label: "CTA URL", widget: string }
                      - { name: more, label: "More (\"Everything in …, plus\")", widget: string, required: false }
                      - name: features
                        label: "Features"
                        widget: list
                        field: { name: item, label: "Feature", widget: string, hint: "Keeps HTML entities, e.g. Vector &amp; source files" }
              - name: staff
                label: "Staffing packages"
                widget: object
                fields:
                  - { name: note, label: "Note", widget: text }
                  - name: cards
                    label: "Cards"
                    widget: list
                    fields:
                      - { name: featured, label: "Featured", widget: boolean, required: false }
                      - { name: badge, label: "Badge", widget: string, required: false }
                      - { name: name, label: "Name", widget: string }
                      - { name: price, label: "Price", widget: string }
                      - { name: per, label: "Per (e.g. /mo)", widget: string, required: false }
                      - { name: desc, label: "Description", widget: string }
                      - { name: ctaLabel, label: "CTA label", widget: string }
                      - { name: ctaUrl, label: "CTA URL", widget: string }
                      - { name: more, label: "More (\"Everything in …, plus\")", widget: string, required: false }
                      - name: features
                        label: "Features"
                        widget: list
                        field: { name: item, label: "Feature", widget: string, hint: "Keeps HTML entities, e.g. Vector &amp; source files" }
              - { name: guarantee, label: "Guarantee", widget: text, hint: "Keeps HTML: emphasis with <strong>…</strong>" }
          # ---- evidence ---------------------------------------------------
          - name: evidence
            label: "Evidence"
            widget: object
            fields:
              - { name: chapterLabel, label: "Chapter label", widget: string }
              - { name: hold, label: "Hold", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…" }
              - { name: note, label: "Note", widget: text }
              - { name: linkLabel, label: "Link label", widget: string }
              - { name: linkUrl, label: "Link URL", widget: string }
          # ---- studio -----------------------------------------------------
          - name: studio
            label: "Studio"
            widget: object
            fields:
              - { name: chapterLabel, label: "Chapter label", widget: string }
              - { name: statement, label: "Statement", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…, newlines." }
              - name: principles
                label: "Principles"
                widget: list
                fields:
                  - { name: num, label: "Number", widget: string }
                  - { name: text, label: "Text", widget: text }
              - { name: where, label: "Where", widget: text }
          # ---- contact ----------------------------------------------------
          - name: contact
            label: "Contact"
            widget: object
            fields:
              - { name: chapterLabel, label: "Chapter label", widget: string }
              - { name: statement, label: "Statement", widget: text, hint: "Keeps HTML: <span class=\"line\">…, <em>…" }
              - { name: email, label: "Email", widget: string }
              - { name: note, label: "Note", widget: text }
          # ---- footer -----------------------------------------------------
          - name: footer
            label: "Footer"
            widget: object
            fields:
              - { name: indexLabel, label: "Index label", widget: string }
              - name: indexLinks
                label: "Index links"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: href, label: "Href", widget: string }
              - { name: elsewhereLabel, label: "Elsewhere label", widget: string }
              - name: socialLinks
                label: "Social links"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: url, label: "URL", widget: string }
              - { name: copyright, label: "Copyright", widget: string, hint: "Keeps HTML entities, e.g. &copy; 2026 Oovert LLC" }
              - { name: backToTopLabel, label: "Back to top label", widget: string, hint: "Keeps HTML entities, e.g. Back to top &uarr;" }
              - { name: askAiLabel, label: "Ask-AI label", widget: string, required: false, hint: "Heading above the AI icons, e.g. Ask AI about OOVERT" }
              - { name: askAiPrompt, label: "Ask-AI prompt", widget: text, required: false, hint: "The question sent to each AI assistant when its icon is clicked." }
          # ---- showreel (optional homepage video band) -------------------
          - name: showreel
            label: "Showreel (optional homepage video band)"
            widget: object
            required: false
            fields:
              - { name: label, label: "Label", widget: string, required: false, hint: "Small caption over the video, e.g. Selected work, 2024. Supports HTML." }
              - name: video
                label: "🎬 Video"
                widget: object
                required: false
                collapsed: true
                hint: "A full-bleed clip near the foot of the homepage. Best muted + looping."
                fields:
                  - { name: src, label: "Video file (mp4 / webm)", widget: file, required: false, hint: "Click, then Upload — this picker accepts videos (an Image picker does not). .mp4 has the widest support; .webm also works." }
                  - { name: poster, label: "Poster image", widget: image, required: false, hint: "Still frame shown before the clip plays and while it loads." }
                  - { name: autoplay, label: "Autoplay in view", widget: boolean, default: true, required: false, hint: "Plays (muted) when scrolled into view; pauses when off-screen." }
                  - { name: loop, label: "Loop", widget: boolean, default: true, required: false }
                  - { name: muted, label: "Muted", widget: boolean, default: true, required: false, hint: "Required for autoplay. Turn off only with autoplay off and controls on." }
                  - { name: controls, label: "Show player controls", widget: boolean, default: false, required: false, hint: "Native play / pause / volume bar. Leave off for background clips." }
                  - { name: speed, label: "Playback speed", widget: number, value_type: float, default: 1, min: 0.25, max: 3, step: 0.05, required: false, hint: "1 = normal, 0.5 = half speed, 2 = double." }
                  - { name: start, label: "Start (seconds)", widget: number, value_type: float, default: 0, min: 0, step: 0.1, required: false, hint: "Trim: begin playback at this time." }
                  - { name: end, label: "End (seconds)", widget: number, value_type: float, default: 0, min: 0, step: 0.1, required: false, hint: "Trim: stop here. 0 = play to the natural end." }

  # ==========================================================================
  # Collection 2 — Case studies (folder collection: one JSON per project)
  # ==========================================================================
  - name: projects
    label: "Case studies"
    label_singular: "Case study"
    folder: "src/_data/projects"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    summary: "{{name}}"
    identifier_field: name
    fields:
      - { name: slug, label: "Slug (URL)", widget: string, hint: "The page URL: /work/<slug>/. Lowercase words with hyphens, e.g. nowa-brand-identity. Spaces/capitals are auto-cleaned, but keep it short and readable." }
      - { name: status, label: "Status", widget: select, options: ["draft", "published"], default: "published" }
      - { name: order, label: "Order", widget: number, value_type: int, required: false }
      - { name: name, label: "Name", widget: string, hint: "Supports HTML, e.g. wrap a word in <em>…</em>" }
      - { name: client, label: "Client", widget: string }
      - { name: sector, label: "Sector", widget: string }
      - { name: year, label: "Year", widget: string }
      - { name: scope, label: "Scope", widget: string, hint: "e.g. Naming, identity, web" }
      - name: intro
        label: "Introduction"
        widget: object
        fields:
          - { name: headline, label: "Headline", widget: text, hint: "Supports HTML, e.g. <em>…</em>" }
          - { name: body, label: "Body", widget: text, hint: "Supports HTML entities, e.g. &mdash;" }
      - { name: statement, label: "Brand statement", widget: text, hint: "Supports HTML, e.g. &mdash;, <em>…</em>" }
      - { name: statementSupport, label: "Statement support", widget: text }
      - { name: closing, label: "Closing line", widget: text }
      - { name: nextUrl, label: "Next project URL", widget: string, required: false, hint: "Relative URL, e.g. ../../index.html#evidence" }

      # ---- Per-project theme (all optional; base look used when empty) -----
      - name: theme
        label: "Theme (optional overrides)"
        widget: object
        required: false
        fields:
          - { name: mood, label: "Motion mood", widget: select, required: false, default: "none", options: ["none", "veil"], hint: "none = the standard varied transitions. veil = a modest, unhurried personality: images unveil behind a soft lifting veil and a crescent of light waxes behind the hero — made for a modest-wear / crescent identity like NOWA." }
          - { name: accent, label: "Accent", widget: color }
          - { name: accentOnLight, label: "Accent on light", widget: color, required: false }
          - { name: accentOnDark, label: "Accent on dark", widget: color, required: false }
          - { name: field, label: "Field colour", widget: color, required: false }
          - { name: ease, label: "Ease curve", widget: string, required: false, hint: "CSS easing, e.g. cubic-bezier(.2,.7,0,1)" }
          - { name: motion, label: "Motion scale", widget: number, value_type: float, default: 1, min: 0.6, max: 1.4, step: 0.05, required: false }
          - { name: displayWidth, label: "Display width", widget: number, required: false, hint: "Archivo width 62–125" }
          - { name: displayWeight, label: "Display weight", widget: number, required: false, hint: "100–900" }
          - { name: displayFont, label: "Display font (upload)", widget: file, required: false, hint: "Upload a .woff2 (best) / .otf / .ttf to set this project's headline font, e.g. Luxerie. Leave empty to use the site's default." }
      # ---- Layout & freeform blocks --------------------------------------
      - { name: templateSections, label: "Guided template sections", widget: boolean, default: true, required: false, hint: "On: show the 18 designed sections (02–17) below the hero. Off: build this case study purely from the freeform Content blocks below." }
      - name: blocks
        label: "Content blocks (freeform — video / image / text, any order)"
        widget: list
        required: false
        hint: "Add media (image or video), headings, text, quotes, or spacers in any order. Rendered right after the hero — this is where video can go anywhere you like."
        types:
          - name: media
            label: "Image / Video"
            widget: object
            fields:
              - { name: width, label: "Width", widget: select, default: "wide", options: ["contained", "wide", "full"], hint: "contained = text column · wide = near-full · full = edge-to-edge bleed." }
              - { name: bg, label: "Background", widget: select, default: "paper", options: ["paper", "ink"] }
              - { name: transition, label: "Scroll transition", widget: select, default: "rise", options: ["rise", "fade", "mask", "zoom", "slide", "none"] }
              - { name: image, label: "Image", widget: image, required: false, hint: "For a video instead, leave empty and open the '🎬 Video' group below." }
              - { name: alt, label: "Alt text", widget: string, required: false }
              - name: video
                label: "🎬 Video — upload a clip to use instead of the image"
                widget: object
                required: false
                collapsed: true
                fields:
                  - { name: src, label: "Video file (mp4 / webm)", widget: file, required: false, hint: "Click, then Upload — this picker accepts videos (the Image picker above does not). .mp4 has the widest support; .webm also works. When set, the video replaces the image in this slot." }
                  - { name: poster, label: "Poster image", widget: image, required: false, hint: "Still frame shown before the clip plays and while it loads." }
                  - { name: autoplay, label: "Autoplay in view", widget: boolean, default: true, required: false, hint: "Plays (muted) when scrolled into view; pauses when off-screen." }
                  - { name: loop, label: "Loop", widget: boolean, default: true, required: false }
                  - { name: muted, label: "Muted", widget: boolean, default: true, required: false, hint: "Required for autoplay. Turn off only with autoplay off and controls on." }
                  - { name: controls, label: "Show player controls", widget: boolean, default: false, required: false, hint: "Native play / pause / volume bar. Leave off for background clips." }
                  - { name: speed, label: "Playback speed", widget: number, value_type: float, default: 1, min: 0.25, max: 3, step: 0.05, required: false, hint: "1 = normal, 0.5 = half speed, 2 = double." }
                  - { name: start, label: "Start (seconds)", widget: number, value_type: float, default: 0, min: 0, step: 0.1, required: false, hint: "Trim: begin playback at this time." }
                  - { name: end, label: "End (seconds)", widget: number, value_type: float, default: 0, min: 0, step: 0.1, required: false, hint: "Trim: stop here. 0 = play to the natural end." }
              - { name: caption, label: "Caption", widget: string, required: false, hint: "Optional line under the media. Supports HTML." }
          - name: heading
            label: "Heading"
            widget: object
            fields:
              - { name: bg, label: "Background", widget: select, default: "paper", options: ["paper", "ink"] }
              - { name: text, label: "Heading", widget: string, hint: "Big display line. Supports HTML, e.g. <em>…</em>." }
          - name: text
            label: "Text"
            widget: object
            fields:
              - { name: bg, label: "Background", widget: select, default: "paper", options: ["paper", "ink"] }
              - { name: text, label: "Body text", widget: text, hint: "Supports HTML." }
          - name: quote
            label: "Quote"
            widget: object
            fields:
              - { name: bg, label: "Background", widget: select, default: "ink", options: ["paper", "ink"] }
              - { name: text, label: "Quote", widget: text, hint: "A short, bold pulled statement." }
          - name: spacer
            label: "Spacer"
            widget: object
            fields:
              - { name: space, label: "Height", widget: select, default: "medium", options: ["small", "medium", "large"] }
              - { name: bg, label: "Background", widget: select, default: "paper", options: ["paper", "ink"] }
      # ---- Sections -------------------------------------------------------
      # Field names mirror project.sections.<key> exactly. Every media slot
      # takes an image OR a video (the collapsed "Video" group; when a video
      # file is set it replaces the image). Multi-item sections take a mixed
      # list where each entry is an image or a video.
      - name: sections
        label: "Sections"
        widget: object
        fields:
          # 01 · Hero — image or video
          - name: hero
            label: "01 · Hero (image or video)"
