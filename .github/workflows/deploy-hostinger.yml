name: Build and deploy to Hostinger

# Runs on every change to main — including content saved from the CMS, which
# commits to main. Builds the Eleventy site and uploads the built _site folder
# to Hostinger over FTPS, so the live site stays in sync automatically.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Surface the secret as an env var so the deploy step can be skipped
    # (cleanly, no red run) until the FTP secrets are configured.
    env:
      HAS_FTP: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      # Hostinger's FTPS control socket is sometimes slow to establish from a
      # GitHub runner, which surfaces as "Timeout (control socket)" and fails an
      # otherwise-healthy deploy. The build above is deterministic; only the
      # upload is flaky. So we give the connection a generous timeout and one
      # automatic retry — the sync is stateful, so the retry only re-sends what
      # the first attempt didn't finish. server-dir is the folder that serves
      # oovert.com: usually /public_html/ for a primary domain, or
      # /domains/oovert.com/public_html/ for a secondary domain.
      - name: Upload _site to Hostinger (FTPS)
        id: ftp
        if: ${{ env.HAS_FTP != '' }}
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 120000
          local-dir: ./_site/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}

      - name: Retry the upload if the first attempt timed out
        if: ${{ steps.ftp.outcome == 'failure' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 120000
          local-dir: ./_site/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
